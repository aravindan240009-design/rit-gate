# Database Configuration - RIT Chennai MySQL (production)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://103.14.121.118:3306/ritchennaiedu_gate?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata&characterEncoding=UTF-8&autoReconnect=true&failOverReadOnly=false&maxReconnects=10&connectTimeout=10000&socketTimeout=30000}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:ritchennaiedu_gate}
# Password comes from the SPRING_DATASOURCE_PASSWORD env var (set in Render / .env) — never hardcoded
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=120000
spring.datasource.hikari.max-lifetime=180000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.keepalive-time=30000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.leak-detection-threshold=120000
spring.datasource.hikari.initialization-fail-timeout=60000
# Session timezone = IST so NOW() and DEFAULT CURRENT_TIMESTAMP store IST
# (charset is set via characterEncoding in the URL)
spring.datasource.hikari.connection-init-sql=SET time_zone = '+05:30'

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=30
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.generate_statistics=false
spring.jpa.properties.hibernate.cache.use_second_level_cache=false
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Server — Tomcat tuning for fast response
server.address=0.0.0.0
server.port=${PORT:8080}
server.tomcat.relaxed-path-chars=|,{,},[,]
server.tomcat.relaxed-query-chars=|,{,},[,]
server.tomcat.max-threads=50
server.tomcat.min-spare-threads=5
server.tomcat.accept-count=100
server.tomcat.connection-timeout=20000
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain
server.compression.min-response-size=1024
server.http2.enabled=false

# Response caching headers
spring.web.resources.cache.cachecontrol.max-age=0

# Startup speed — skip unnecessary auto-config
spring.main.lazy-initialization=true
spring.jmx.enabled=false

backend.base.url=${BACKEND_BASE_URL:http://localhost:8080}

# Email Configuration - Brevo HTTP API
brevo.api.key=${BREVO_API_KEY:}
brevo.sender.email=${BREVO_SENDER_EMAIL:uixydhvbxdjk850@gmail.com}
brevo.sender.name=RIT Gate

# Auth
auth.otp.expiry.minutes=5
auth.otp.max.attempts=3
auth.rate.limit.seconds=60

# FCM Push Notifications (HTTP v1 API)
# FIREBASE_SERVICE_ACCOUNT_JSON = entire service account JSON as one line
# FIREBASE_PROJECT_ID = your Firebase project ID (e.g. ritgate-12345)
firebase.service.account.json=${FIREBASE_SERVICE_ACCOUNT_JSON:}
firebase.project.id=${FIREBASE_PROJECT_ID:}

# Timezone — IST (UTC+5:30)
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata
user.timezone=Asia/Kolkata

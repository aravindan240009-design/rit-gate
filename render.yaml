services:
  - type: web
    name: rit-transport-backend
    runtime: docker
    plan: free
    envVars:
      - key: PORT
        value: 8080
      - key: SPRING_DATASOURCE_URL
        sync: false # Set in Render: jdbc:mysql://centerbeam.proxy.rlwy.net:58876/railway?useSSL=true&allowPublicKeyRetrieval=true
      - key: SPRING_DATASOURCE_USERNAME
        sync: false # Set in Render: root
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false # Set in Render Dashboard
      - key: SPRING_MAIL_HOST
        value: smtp.gmail.com
      - key: SPRING_MAIL_PORT
        value: 587
      - key: SPRING_MAIL_USERNAME
        sync: false # Set in Render Dashboard
      - key: SPRING_MAIL_PASSWORD
        sync: false # Set in Render Dashboard (App Password)
      - key: BACKEND_BASE_URL
        sync: false # Set to your Render URL: https://rit-backend.onrender.com
